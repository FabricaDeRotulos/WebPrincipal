<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAZ Gráfica | Etiquetas</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1 { color:#facc15; }

.container {
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  border-radius:12px;
  padding:15px;
}

button {
  background:#22c55e;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

#carrito {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:15px;
  overflow:auto;
}

footer {
  text-align:center;
  padding:20px;
  color:#64748b;
}
</style>
</head>

<body>

<header>
  <h1>BRAZ</h1>
  <button onclick="enviarPedido()">Finalizar pedido</button>
</header>

<div class="container">

<h2>Calculadora de Etiquetas</h2>

<div class="card">
  <label>Tamaño</label>
  <select id="tam">
    <option value="2">2 cm</option>
    <option value="3">3 cm</option>
    <option value="4">4 cm</option>
    <option value="5">5 cm</option>
    <option value="8">8 cm</option>
    <option value="10">10 cm</option>
  </select>

  <label>Cantidad deseada</label>
  <input type="number" id="cantidad" placeholder="Ej: 500">

  <button onclick="calcular()">Calcular</button>

  <p id="resultado"></p>
</div>

<h2>Productos</h2>

<div class="grid" id="productos"></div>

</div>

<div id="carrito">
  <h3>Carrito</h3>
  <ul id="lista"></ul>
</div>

<footer>
© 2026 BRAZ Gráfica
</footer>

<script>

const productos = [
  {nombre:"Etiquetas 5cm", precio:450},
  {nombre:"Etiquetas 3cm", precio:450},
  {nombre:"Etiquetas 8cm", precio:450}
];

let carrito = [];

function renderProductos(){
  let html="";
  productos.forEach((p,i)=>{
    html+=`
    <div class="card">
      <h3>${p.nombre}</h3>
      <p>$${p.precio}</p>
      <button onclick="agregar(${i})">Agregar</button>
    </div>`;
  });
  document.getElementById("productos").innerHTML=html;
}

function agregar(i){
  carrito.push(productos[i]);
  renderCarrito();
}

function renderCarrito(){
  let html="";
  carrito.forEach(p=>{
    html+=`<li>${p.nombre} - $${p.precio}</li>`;
  });
  document.getElementById("lista").innerHTML=html;
}

function enviarPedido(){
  let texto="Hola, quiero pedir:%0A";
  carrito.forEach(p=>{
    texto+=`- ${p.nombre} ($${p.precio})%0A`;
  });

  window.open(`https://wa.me/5555991140736?text=${texto}`);
}

function calcular(){
  let tam = document.getElementById("tam").value;
  let cantidad = document.getElementById("cantidad").value;

  let base = {
    2:2500,
    3:1089,
    4:625,
    5:400,
    8:144,
    10:100
  };

  let packs = Math.ceil(cantidad / base[tam]);
  let total = packs * 450;

  document.getElementById("resultado").innerHTML =
    `Necesitas ${packs} packs → Total: $${total}`;
}

renderProductos();

</script>

</body>
</html>
